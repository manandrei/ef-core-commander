name: Package VSIX

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to package and release
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
      - run: npm ci --prefix src/ef-core-commander
      - run: npm test --prefix src/ef-core-commander
      - name: Package VSIX
        shell: bash
        run: |
          mkdir -p artifacts/vsix
          cd src/ef-core-commander
          npx --yes @vscode/vsce package --out "../../artifacts/vsix/ef-core-commander-${RELEASE_TAG}.vsix"
      - uses: actions/upload-artifact@v7
        with:
          name: ef-core-commander-vsix
          path: artifacts/vsix/*.vsix
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" artifacts/vsix/*.vsix --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$RELEASE_TAG" artifacts/vsix/*.vsix \
              --repo "$GITHUB_REPOSITORY" \
              --title "EF Core Commander $RELEASE_TAG" \
              --generate-notes
          fi
