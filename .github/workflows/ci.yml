name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  extension:
    name: VS Code extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
      - run: npm ci --prefix src/ef-core-commander
      - run: npm test --prefix src/ef-core-commander

  sqlite-fixture:
    name: EF Core SQLite fixture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x
      - run: dotnet restore test/fixtures/ef-core-commander-sqlite-test/EfCoreCommander.SqliteTest.csproj
      - run: dotnet build test/fixtures/ef-core-commander-sqlite-test/EfCoreCommander.SqliteTest.csproj --no-restore
      - name: Check NuGet vulnerabilities
        shell: bash
        run: |
          result="$(dotnet list test/fixtures/ef-core-commander-sqlite-test/EfCoreCommander.SqliteTest.csproj package --vulnerable --include-transitive)"
          echo "$result"
          grep -q "has no vulnerable packages" <<< "$result"
