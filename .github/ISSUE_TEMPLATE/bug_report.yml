name: Bug report
description: Report a reproducible problem in the EF Core Commander VS Code extension
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Briefly describe the problem.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the relevant command or project details if needed.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Optionally include your VS Code, extension and .NET versions.
