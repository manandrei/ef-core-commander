name: Feature request
description: Suggest an improvement for the EF Core Commander VS Code extension
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: idea
    attributes:
      label: What would you like to improve?
      description: Describe the problem or use case.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Suggested solution
      description: Describe how you would like it to work.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Additional context
      description: Optionally add examples, screenshots or alternatives.
